name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build wheel only (no PyPI upload)"
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build sdist/wheel
        run: python -m build
      - name: Smoke install wheel in clean venv
        run: |
          python -m venv /tmp/deup-smoke
          /tmp/deup-smoke/bin/pip install --upgrade pip
          /tmp/deup-smoke/bin/pip install dist/deup-*.whl
          /tmp/deup-smoke/bin/python -c "
          import deup
          from deup import DEUPRegressor, DEUPClassifier, DEUPRanker
          print('deup', deup.__version__)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build-check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build-check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
